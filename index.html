<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>%APP_PRODUCT_TITLE%</title>
    <script>
      try {
        var t = localStorage.getItem("%APP_STORAGE_KEY_PREFIX%.theme");
        if (t === "light" || t === "dark") {
          document.documentElement.dataset.theme = t;
        }
      } catch (e) {}
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

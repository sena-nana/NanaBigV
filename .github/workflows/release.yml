name: Publish Windows Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: 要发布的 tag，例如 v0.1.0。
        required: true
        type: string
      ref:
        description: 要发布的 branch、tag 或 commit。留空时使用 tag。
        required: false
        type: string

permissions:
  contents: write

jobs:
  verify:
    name: Verify release
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Resolve ref
        id: release_ref
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.tag }}"
            $ref = "${{ inputs.ref }}"
          } else {
            $ref = $tag
          }
          if (-not $ref) {
            $ref = $tag
          }
          if (-not $tag) {
            throw "Release tag is required."
          }
          "tag=$tag" >> $env:GITHUB_OUTPUT
          if ($ref) {
            "ref=$ref" >> $env:GITHUB_OUTPUT
          }

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.release_ref.outputs.ref || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack yarn install --immutable

      - name: Verify template
        run: corepack yarn verify

  publish-windows:
    name: Publish Windows bundle
    needs: verify
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Resolve ref
        id: release_ref
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.tag }}"
            $ref = "${{ inputs.ref }}"
          } else {
            $ref = $tag
          }
          if (-not $ref) {
            $ref = $tag
          }
          if (-not $tag) {
            throw "Release tag is required."
          }
          "tag=$tag" >> $env:GITHUB_OUTPUT
          if ($ref) {
            "ref=$ref" >> $env:GITHUB_OUTPUT
          }

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.release_ref.outputs.ref || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack yarn install --immutable

      - name: Resolve app metadata
        id: app_metadata
        shell: pwsh
        run: |
          $config = Get-Content app.config.json -Raw | ConvertFrom-Json
          "product_title=$($config.productTitle)" >> $env:GITHUB_OUTPUT

      - name: Build and publish Windows bundle
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          tauriScript: corepack yarn tauri
          tagName: ${{ steps.release_ref.outputs.tag }}
          releaseName: ${{ steps.app_metadata.outputs.product_title }} ${{ steps.release_ref.outputs.tag }}
          releaseDraft: true
          generateReleaseNotes: true
